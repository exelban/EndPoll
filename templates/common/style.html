{{ define "style" }}
<link rel="icon" href="/static/favicon.ico" sizes="any">

<style>
  #chart-tooltip {
    display: none;
    position: fixed;
    z-index: 1000;
    padding: 10px 12px;
    background-color: var(--color-fg-reverse);
    color: var(--color-fg);
    font-size: 12px;
    line-height: 1.5;
    white-space: pre;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    border: solid var(--color-section-bg) 1px;
    pointer-events: none;
  }

  :root, [data-theme="light"] {
    --color-bg: #F0F1F3;
    --color-fg: #23262C;
    --color-fg-reverse: #ffffff;
    --color-main: #029AE8;
    --color-subtitle: #989898;
    --color-section-bg: #eaeaea;

    --color-white: #ffffff;
    --color-gray: #bebebe;
    --color-green: #47A417;
    --color-orange: #E8AE01;
    --color-red: #EE402E;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  }
  [data-theme="dark"] {
    --color-bg: #1a1d23;
    --color-fg: #d4d4d8;
    --color-fg-reverse: #22252b;
    --color-subtitle: #71717a;
    --color-section-bg: #2a2d35;

    --color-gray: #606060;
    --color-green: #47A417;
    --color-orange: #c59a0e;
    --color-red: #b2382d;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  html {
    width: 100%;
    height: 100%;
    color-scheme: light dark;
    background-color: var(--color-bg);
    color: var(--color-fg);
    font-family: system-ui, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, Helvetica, Arial, "Helvetica Neue", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    font-size: 18px;
    font-weight: 400;
  }
  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #ffffff;
    background: var(--color-gray);
    box-shadow: var(--shadow-md);

    section {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      gap: 8px;
    }
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: baseline;
    gap: 20px;
    flex: 1;
    margin: 20px auto !important;

    .panel {
      width: calc(100% - 42px);
      display: flex;
      flex-direction: column;
      padding: 14px 20px;
      gap: 10px;
      border-bottom: solid var(--color-section-bg) 1px;
      transition: background-color 150ms ease;
      &:last-child {
        border-bottom: none;
      }
    }
    .container, &.container {
      gap: 8px;
    }
    section {
      width: calc(100% - 2px);
      background: var(--color-fg-reverse);
      border: solid var(--color-section-bg) 1px;
      box-shadow: var(--shadow-sm);
      padding: 0;
      flex-direction: column;
      overflow: visible;

      .head {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;

        label {
          display: flex;
          flex-direction: row;
          gap: 6px;
          cursor: pointer;
          font-size: 14px;
          font-weight: 500;
          align-items: center;

          input {
            display: none;

            &:checked {
              ~ .icon-down {
                display: none;
              }
            }
            &:not(:checked) {
              ~ .icon-up {
                display: none;
              }
            }
          }

          svg {
            transition: transform 200ms ease;
          }
        }

        .info {
          display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          gap: 6px;
          p, a {
            font-size: 14px;
            font-weight: 500;
            &:nth-child(2) {
              font-size: 13px;
              font-weight: 300;
              text-transform: none;
              color: var(--color-subtitle);
            }
          }
          a {
            text-decoration: none;
            &:hover {
              text-decoration: underline;
            }
          }
          span {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: 300;
            color: var(--color-subtitle);
            gap: 3px;
          }
        }

        p.status {
          font-size: 12px;
          font-weight: 500;
          text-transform: uppercase;
          letter-spacing: 0.04em;
          flex-shrink: 0;
          padding: 3px 10px;
          border-radius: 20px;
        }
        p.status-unknown {
          color: var(--color-gray);
          background: color-mix(in srgb, var(--color-gray) 12%, transparent);
        }
        p.status-up {
          color: var(--color-green);
          background: color-mix(in srgb, var(--color-green) 12%, transparent);
        }
        p.status-degraded {
          color: var(--color-orange);
          background: color-mix(in srgb, var(--color-orange) 12%, transparent);
        }
        p.status-down {
          color: var(--color-red);
          background: color-mix(in srgb, var(--color-red) 12%, transparent);
        }
      }
      .chart {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;

        ul {
          width: 100%;
          height: 34px;
          list-style: none;
          padding: 0;
          margin: 0;
          display: flex;
          gap: 2px;
          flex-direction: row;
          li {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            border-radius: 2px;
            transition: all 150ms ease;
            position: relative;
            display: inline-block;

            span {
              display: none;
            }

            &:hover {
              transform: scaleY(1.10);
              filter: brightness(1.15);
              transition: all 150ms ease;
            }

            @media only screen and (max-width: 600px) {
              &:nth-child(-n+60) {
                display: none;
              }
            }
            @media only screen and (max-width: 800px) {
              &:nth-child(-n+30) {
                display: none;
              }
            }
          }
        }
        .legend {
          width: 100%;
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 10px;
          p, span {
            font-size: 12px;
            color: var(--color-subtitle);
            font-weight: 300;
          }
          .spacer {
            flex: 1;
            width: auto;
            height: 0;
            border-top: 1px dashed var(--color-section-bg);
          }
        }
      }
      .services {
        width: 100%;
        display: none;
        flex-direction: column;
        overflow: visible;

        .panel {
          width: calc(100% - 22px);
          padding: 10px;
          border: solid var(--color-section-bg) 1px;
          border-bottom: none;
          overflow: visible;
          &:last-child {
            border-bottom: solid var(--color-section-bg) 1px;
          }
          .chart ul {
            height: 22px;
          }
        }
      }
      &.details {
        width: 100%;
        gap: 8px;
        flex-direction: row;
        flex-wrap: wrap;
        background: transparent;
        border: none;
        box-shadow: none;

        .panel {
          flex-grow: 1;
          flex-basis: 0;
          align-self: stretch;
          background: var(--color-fg-reverse);
          border: solid var(--color-section-bg) 1px;
          box-shadow: var(--shadow-sm);
          &:hover {
            background-color: var(--color-fg-reverse);
          }
        }

        h2 {
          font-size: 22px;
          font-weight: 600;
          color: var(--color-fg);
          margin: 8px 0 0 0;
          padding: 0;
        }
        h3 {
          font-size: 13px;
          font-weight: 500;
          color: var(--color-subtitle);
          margin: 0;
          padding: 0;
        }

        .time {
          display: flex;
          flex-direction: row;
          justify-content: space-between;

          :last-child {
            text-align: end;
          }
        }

        @media only screen and (max-width: 600px) {
          flex-direction: column;
        }
      }
      .incident {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding: 18px 0;

        .head, .info {
          flex-wrap: wrap;
          gap: 10px;
        }

        .icon {
          width: 28px;
          height: 28px;
          border-radius: 28px;
          display: flex;
          justify-content: center;
          align-items: center;
          color: var(--color-white);
          flex-shrink: 0;
        }
        .value {
          flex-direction: column;

          h3 {
            font-size: 14px;
            font-weight: 500;
            white-space: normal;
            color: var(--color-fg);
            margin: 0;
            padding: 0;
          }
          h4 {
            font-size: 12px;
            font-weight: 400;
            white-space: normal;
            color: var(--color-subtitle);
            margin: 2px 0 0 0;
            padding: 0;
          }
        }
        .ts {
          font-size: 13px;
          color: var(--color-subtitle);
          text-align: end;
        }
      }
      img {
        max-width: 100%;
        max-height: 100%;
      }

      .head:has(input:checked) ~ .services {
        display: flex;
      }
    }
  }
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;

    a {
      svg {
        fill: var(--color-subtitle);
        transition: fill 150ms ease;
      }
      &:hover svg {
        fill: var(--color-fg);
      }
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--color-subtitle);
      padding: 6px;
      border-radius: 6px;
      transition: all 150ms ease;
      &:hover {
        color: var(--color-fg);
        background: color-mix(in srgb, var(--color-section-bg) 50%, transparent);
      }
    }
    #dark-mode, #light-mode {
      display: none;
    }
  }

  section {
    width: 100%;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  a {
    color: var(--color-main);
  }
  p {
    margin: 0;
    padding: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .container {
    width: 100%;
    margin: auto;
    padding: 20px 0;

    > .legend {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: end;
      align-items: center;
      font-size: 13px;
      color: var(--color-subtitle);

      a {
        margin-left: 4px;
        font-size: 13px;
        text-decoration: none;
        &:hover {
          text-decoration: underline;
        }
      }

      @media only screen and (max-width: 600px) {
        width: calc(100% - 20px);
        padding: 0 10px;
      }
    }
  }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px !important;
    gap: 8px !important;
    color: var(--color-subtitle);
    text-align: center;

    svg {
      margin-bottom: 4px;
    }
    p {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-fg);
      overflow: visible;
      white-space: normal;
    }
    span {
      font-size: 13px;
    }
  }
  .status-unknown {
    background: var(--color-gray);
    svg.icon-question {
      display: block !important;
    }
  }
  .status-up {
    background: var(--color-green);
    svg.icon-check {
      display: block !important;
    }
  }
  .status-degraded {
    background: var(--color-orange);
    svg.icon-bug {
      display: block !important;
    }
  }
  .status-down {
    background: var(--color-red);
    svg.icon-cross {
      display: block !important;
    }
  }

  @media only screen and (min-width: 600px) {
    body {
      height: calc(100% - 40px);
      margin: 40px 0 0 0;
    }
    .container {
      width: 96%;
    }
    header, main section, .panel {
      border-radius: 8px;
    }
    footer > section {
      padding: 0;
    }
  }
  @media only screen and (min-width: 800px) {
    .container {
      width: 90%;
    }
  }
  @media only screen and (min-width: 1000px) {
    .container {
      width: 920px;
    }
  }

  @media only screen and (min-width: 601px) {
    .bp600 {
      display: none;
    }
  }
  @media only screen and (max-width: 600px), only screen and (min-width: 801px) {
    .bp800 {
      display: none;
    }
  }
  @media only screen and (max-width: 800px) {
    .bp1000 {
      display: none;
    }
  }

  [data-tooltip] {
    position: relative;
    cursor: help;

    &::before {
      left: 50%;
      opacity: 0;
      position: absolute;
      z-index: -100;
    }

    &:hover::before, &:focus::before {
      opacity: 1;
      transform: scale(1) translateY(0);
      z-index: 100;
    }

    &::before {
      content: attr(data-tooltip);
      width: 160px;
      margin-left: -80px;
      padding: 10px 12px;
      top: 150%;
      border-radius: 8px;
      background: var(--color-fg-reverse);
      border: solid var(--color-section-bg) 1px;
      box-shadow: var(--shadow-md);
      color: var(--color-fg);
      transition: all 150ms cubic-bezier(.84,-0.18,.31,1.26) 100ms;
      transform:  scale(.6) translateY(50%);
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 760px) {
      &::before {
        font-size: .75em;
        margin-left: -5em;
        width: 10em;
      }
    }
  }
</style>

{{ end }}
