<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EndPoll is a simple and lightweight status page for monitoring your services and systems.">

  <title>Page not found - EndPoll</title>

  {{ template "style" . }}

  <style>
    main.container {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px !important;
      margin-top: -5%;
      gap: 6px !important;
    }
    .error-page .code {
      font-size: 56px;
      font-weight: 700;
      color: var(--color-section-bg);
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-page p {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-fg);
      overflow: visible;
      white-space: normal;
      margin-bottom: 4px;
    }
    .error-page a {
      font-size: 14px;
      text-decoration: none;
    }
    .error-page a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<main class="container">
  <section class="panel error-page">
    <div class="code">404</div>
    <p>Page not found</p>
    <a href="/">Back to status page</a>
  </section>
</main>

{{ template "footer" . }}

</body>
</html>
